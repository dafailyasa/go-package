name: Unit Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

permissions:
  contents: read

jobs:
  test:
    name: Go Unit Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version:
          - "1.24"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download Dependencies
        run: go mod download

      - name: Verify Dependencies
        run: go mod verify

      - name: Run Go Vet
        run: make vet

      - name: Run Unit Tests
        run: make coverage-check
