name: Unit Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go Unit Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version:
          - "1.24.5" # Use an exact version instead of "1.24"

    env:
      GOTOOLCHAIN: local
      GOCOVERDIR: ""

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
          cache: true

      - name: Debug Go Environment
        run: |
          go version
          go env

      - name: Download Dependencies
        run: go mod download

      - name: Verify Dependencies
        run: go mod verify

      - name: Run Go Vet
        run: make vet

      - name: Run Unit Tests
        run: make coverage-check

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
